name: Import Substack posts

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Import Substack RSS into _posts/
        run: python3 bin/import_substack.py

      - name: Commit new stubs
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet --exit-code _posts; then
            echo "No new Substack posts."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add _posts
          git commit -m "chore: import Substack post(s)"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger site deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref ${{ github.ref_name }}
